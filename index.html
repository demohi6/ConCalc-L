<body>
<input type="file" id="importFile" accept=".json" style="display:none" onchange="handleImport(event)"/>
<input type="file" id="photoInput" accept="image/*" capture="environment" style="display:none" onchange="handlePhotoInput(event)"/>
<div id="app">
  <div class="page" id="pageDash">
    <div class="content" id="dashContent"></div>
  </div>

  <div class="page page-hidden-right" id="pageDetail">
    <div class="detail-hero" id="detailHero"></div>
    <div class="content" id="detailContent"></div>
  </div>

  <div class="page page-hidden-right" id="pagePos">
    <div class="detail-hero" id="posHero"></div>
    <div class="content" id="posContent"></div>
  </div>

  <div class="page page-tab page-hidden-right" id="pageMasters">
    <div class="content" id="mastersContent"></div>
  </div>

  <div class="page page-tab page-hidden-right" id="pageMore">
    <div class="content" id="moreContent"></div>
  </div>

  <div class="page page-tab page-hidden-right" id="pageFinance">
    <div class="content" id="financeContent"></div>
  </div>

  <div class="page page-hidden-right" id="pageObjFinance">
    <div class="content" id="objFinanceContent"></div>
  </div>

  <div class="page page-hidden-right" id="pageJournal">
    <div class="content" id="journalContent"></div>
  </div>
</div>
<div class="tab-bar" id="tabBar">
  <div class="tab-item active" id="tab-home" onclick="switchTab('home')">
    <i class="tab-icon ph ph-house"></i>
    <div class="tab-label" id="tabLabelHome">Главная</div>
  </div>
  <div class="tab-item" id="tab-masters" onclick="switchTab('masters')">
    <i class="tab-icon ph ph-hard-hat"></i>
    <div class="tab-label" id="tabLabelMasters">Мастера</div>
  </div>
  <div class="tab-item tab-item-add" id="tabAdd" onclick="onTabAdd()">
    <div class="tab-add-bubble"><i class="ph ph-plus"></i></div>
  </div>
  <div class="tab-item" id="tab-finance" onclick="switchTab('finance')">
    <i class="tab-icon ph ph-wallet"></i>
    <div class="tab-label" id="tabLabelFinance">Финансы</div>
  </div>
  <div class="tab-item" id="tab-more" onclick="switchTab('more')">
    <i class="tab-icon ph ph-dots-three"></i>
    <div class="tab-label" id="tabLabelMore">Ещё</div>
  </div>
</div>
<div class="toast" id="toast"></div>
